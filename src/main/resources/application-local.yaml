apartments:
  url: https://search.irvinecompanyapartments.com/units/rank
  checkInterval: 120
  communities:
    - communityId: 11584d39-2644-4b8e-8548-7c2a126c0570
      name: Promenade
    - communityId: 8af0a529-cf5d-4538-8534-93edcdcd3e48
      name: Pacifica

logging:
  level:
    root: INFO
    org.hibernate.SQL: INFO
    com.grishin: DEBUG

spring:
  main:
    web-application-type: servlet
  application.name: apartment.checker
  datasource:
    url: jdbc:h2:mem:apartments;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driverClassName: org.h2.Driver
    username: ${SQL_DB_USERNAME}
    password: ${SQL_DB_PASSWORD}

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true

telegram.bot:
  name: Irvine Company Apartment Checker Bot
